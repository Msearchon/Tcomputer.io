<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Msearchon - Search Engine</title>
    <style>
        /* CSS: Isse aapka page sundar dikhega */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #ffffff;
        }
        .logo {
            font-size: 50px;
            font-weight: bold;
            color: #4285F4; /* Blue color */
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 450px;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            font-size: 16px;
        }
        input[type="text"]:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        .search-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-btn:hover {
            border: 1px solid #dadce0;
            color: #202124;
        }
    </style>
</head>
<body>

    <div class="logo">Msearchon</div>

    <form action="https://www.google.com/search" method="GET">
        <input type="text" name="q" placeholder="Puri duniya se kuch bhi search karein..." required>
        <br>
        <input type="submit" value="Search Now" class="search-btn">
    </form>

</body>
</html>
